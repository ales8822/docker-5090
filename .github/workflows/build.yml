name: Build and Publish Docker Image

# This tells GitHub to build the image every time you upload new files
on:
  push: 
    branches:[ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. GitHub's free computers are small. This frees up 30GB of disk space so our massive AI image fits!
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      # 2. Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 3. Log into GitHub's free Docker registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Make sure the repository name is lowercase (Docker requirement)
      - name: Lowercase Repository Name
        id: string
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ github.repository }}

      # 5. Build the image and push it to GHCR!
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.string.outputs.lowercase }}:latest