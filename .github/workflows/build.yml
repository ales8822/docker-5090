name: Build and Push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- THE MAGIC STEP (UPDATED) ---
      - name: Free Disk Space & Create Swap Space
        run: |
          echo "Freeing up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          
          echo "Creating 16GB swap file using dd (this takes about 15-20 seconds)..."
          sudo dd if=/dev/zero of=/swapfile-extra bs=1M count=16384 status=progress
          sudo chmod 600 /swapfile-extra
          sudo mkswap /swapfile-extra
          sudo swapon /swapfile-extra
          
          echo "=== Memory and Swap Status ==="
          free -h
          echo "=== Disk Space Status ==="
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}:4090
          # Use GHA cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max